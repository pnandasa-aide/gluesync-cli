version: '3.8'

services:
  gluesync-cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: gluesync-cli:latest
    container_name: gluesync-cli
    volumes:
      # Mount configuration files
      - ./config.json:/app/config/config.json:ro
      - ./.env:/app/config/.env:ro
      # Mount data directory for exports/imports
      - ./data:/app/data
      # Mount for scripts if needed
      - ./scripts:/app/scripts:ro
    environment:
      - GLUESYNC_CONFIG_PATH=/app/config/config.json
      - GLUESYNC_ENV_PATH=/app/config/.env
    # Keep container running for exec commands
    stdin_open: true
    tty: true
    command: ["pipeline", "list"]
    networks:
      - gluesync-cli-net

  # Optional: Development mode with hot reload
  gluesync-cli-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: gluesync-cli:dev
    container_name: gluesync-cli-dev
    volumes:
      - .:/app
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
      - GLUESYNC_CONFIG_PATH=/app/config.json
      - GLUESYNC_ENV_PATH=/app/.env
    stdin_open: true
    tty: true
    profiles:
      - dev
    networks:
      - gluesync-cli-net

networks:
  gluesync-cli-net:
    driver: bridge
